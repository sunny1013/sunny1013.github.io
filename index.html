<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿨레 생각키우기</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 480px; /* A4 이미지가 잘 보이도록 너비를 조금 늘렸습니다 */
        }
        h1 {
            color: #2563eb;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        /* 브로셔 영역 스타일 */
        .brochure-box {
            margin: 20px 0;
            padding: 10px;
            background: #eef2f6; /* 이미지가 돋보이게 하는 연한 배경 */
            border-radius: 10px;
        }
        
        .brochure-img {
            width: 100%; /* 컨테이너 너비에 맞춤 */
            height: auto; /* 비율 유지 (A4 비율 자동 적용) */
            display: block;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); /* 종이 같은 그림자 효과 */
        }

        .caption {
            font-size: 13px;
            color: #64748b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 스쿨레 생각키우기</h1>
        <p>현재 <strong>홈페이지 제작 중</strong>입니다.<br>
        자세한 프로그램 내용은 아래 안내문을 참고해주세요.</p>
        
        <div class="brochure-box">
            <img src="scholebook_poster.jpg" alt="스쿨레 생각키우기 안내문" class="brochure-img">
        </div>


        <p style="font-size: 14px; color: #9ca3af; margin-top: 30px;">
            Coming Soon
        </p>
    </div>

</body>
</html>
